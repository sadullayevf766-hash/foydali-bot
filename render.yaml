# Render.com Blueprint — Foydali Bot
# Telegram polling bot = "Background Worker" (doimiy ishlaydi, HTTP port kerak emas).
# Eslatma: Render'da Background Worker pullik (Starter ~$7/oy). Bepul reja workerni qo'llamaydi.
services:
  - type: worker
    name: foydali-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Maxfiy qiymatlar — Render boshqaruv panelida qo'lda kiritiladi (sync: false):
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
